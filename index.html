<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Premium+</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

/* 🌈 nền mượt hơn */
background:linear-gradient(-45deg,#0d0d12,#161625,#0f0f14,#1b1b2a);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ===== PARTICLES ===== */
.particle{
position:fixed;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.3;
animation:up 8s linear infinite;
}

@keyframes up{
from{transform:translateY(100vh);opacity:0}
50%{opacity:0.6}
to{transform:translateY(-10vh);opacity:0}
}

/* ===== CARD ===== */
.card{
width:90%;
max-width:380px;
padding:18px;
border-radius:18px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(16px);

box-shadow:0 10px 35px rgba(0,0,0,0.45);
animation:float 5s ease-in-out infinite;

position:relative;
overflow:hidden;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* glow nhẹ */
.card::before{
content:"";
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);
top:-80px;
left:-80px;
filter:blur(25px);
}

/* ===== PROFILE ===== */
.profile{
display:flex;
gap:12px;
align-items:center;
margin-bottom:12px;
}

.avatar{
width:65px;
height:65px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.7);
object-fit:cover;
box-shadow:0 0 15px rgba(255,255,255,0.15);
transition:0.3s;
}

.avatar:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.25);
}

.name{
font-size:18px;
font-weight:700;
}

.desc{
font-size:13px;
opacity:0.7;
}

/* ===== INFO ===== */
.info{
font-size:13px;
opacity:0.75;
margin-bottom:10px;
}

/* ===== BUTTONS ===== */
.btn{
display:block;
width:100%;
padding:11px;
margin:8px 0;
border-radius:12px;

background:rgba(255,255,255,0.08);
color:white;
text-align:center;
text-decoration:none;

transition:0.25s;
border:1px solid rgba(255,255,255,0.08);
}

.btn:hover{
transform:scale(1.04);
background:rgba(255,255,255,0.16);
border-color:rgba(255,255,255,0.25);
}

</style>
</head>

<body>

<div class="card">

<div class="profile">
<img class="avatar" src="./avatar.jpg">

<div>
<div class="name">Chuuong Dao</div>
<div class="desc">Developer • Gamer • Bio</div>
</div>

</div>

<div class="info">
muốn mua code thì vào link bên dưới 👇
</div>

<a class="btn" href="https://web.facebook.com/tr.dao91">📘 Facebook</a>
<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi">🎵 TikTok</a>
<a class="btn" href="https://discord.gg/cpY8dFhN">💬 Discord</a>

<button class="btn" onclick="copy()">📋 Copy Discord</button>
<button class="btn" onclick="shop()">🛒 Shop Code</button>

</div>

<script>

/* ===== PARTICLES ===== */
function spawn(){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
}
setInterval(spawn,250);

/* ===== COPY ===== */
function copy(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied Discord!");
}

/* ===== SHOP ===== */
function shop(){
alert("Shop đang phát triển!");
}

</script>

</body>
</html>
