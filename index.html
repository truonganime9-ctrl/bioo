<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuuong Dao Bio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
background:black;
}

/* ===== VIDEO BACKGROUND ===== */
video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.55);
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* ===== CARD ===== */
.card{
width:90%;
max-width:380px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* PROFILE */
.profile{
display:flex;
align-items:center;
gap:12px;
padding:15px;
}

.avatar{
width:62px;
height:62px;
border-radius:50%;
border:2px solid white;
object-fit:cover;
}

.name{
font-size:18px;
font-weight:700;
}

.desc{
font-size:13px;
opacity:0.7;
margin-top:2px;
}

/* INFO */
.info{
padding:0 15px 10px;
font-size:13px;
opacity:0.8;
}

/* BUTTONS */
.buttons{
padding:10px 15px 15px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
width:100%;
padding:11px;
border:none;
border-radius:10px;
background:#26262c;
color:white;
text-align:center;
text-decoration:none;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
background:#3a3a40;
}

</style>
</head>

<body>

<!-- 🎬 VIDEO BACKGROUND -->
<video class="bg" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- CARD -->
<div class="card">

<!-- AVATAR LOCAL -->
<div class="profile">
<img class="avatar" src="./avatar.jpg">

<div>
<div class="name">Chuuong Dao</div>
<div class="desc">Developer • Gamer • Bio</div>
</div>
</div>

<div class="info">
muốn mua code thì vào link bên dưới 👇
</div>

<div class="buttons">

<a class="btn" href="https://web.facebook.com/tr.dao91" target="_blank">📘 Facebook</a>
<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi" target="_blank">🎵 TikTok</a>
<a class="btn" href="https://discord.gg/cpY8dFhN" target="_blank">💬 Discord</a>

<button class="btn" onclick="copyDiscord()">📋 Copy Discord</button>
<button class="btn" onclick="shop()">🛒 Shop Code</button>

</div>

</div>

<script>

function copyDiscord(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied Discord!");
}

function shop(){
alert("Shop đang phát triển!");
}

</script>

</body>
</html>
