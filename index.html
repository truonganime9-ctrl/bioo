<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuuong Dao Bio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
background:#0b0b10;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ===== CARD ===== */
.card{
width:90%;
max-width:380px;
background:#18181c;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* ===== COVER ===== */
.cover{
width:100%;
height:140px;
object-fit:cover;
}

/* ===== PROFILE ===== */
.profile{
display:flex;
align-items:center;
gap:12px;
padding:15px;
}

.avatar{
width:62px;
height:62px;
border-radius:50%;
border:2px solid white;
object-fit:cover;
}

.name{
font-size:18px;
font-weight:700;
}

.desc{
font-size:13px;
opacity:0.7;
margin-top:2px;
}

/* ===== INFO ===== */
.info{
padding:0 15px 10px;
font-size:13px;
opacity:0.8;
}

/* ===== BUTTONS ===== */
.buttons{
padding:10px 15px 15px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
width:100%;
padding:11px;
border:none;
border-radius:10px;
background:#26262c;
color:white;
text-align:center;
text-decoration:none;
cursor:pointer;
font-size:14px;
transition:0.2s;
box-sizing:border-box;
}

.btn:hover{
transform:scale(1.03);
background:#3a3a40;
}

/* ===== SMALL TAG ===== */
.tag{
font-size:12px;
opacity:0.6;
padding:0 15px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="card">

<!-- COVER -->
<img class="cover" src="https://images.unsplash.com/photo-1503264116251-35a269479413">

<!-- PROFILE -->
<div class="profile">

<!-- LOCAL AVATAR -->
<img class="avatar" src="./avatar.jpg">

<div>
<div class="name">Chuuong Dao</div>
<div class="desc">Developer • Gamer • Bio</div>
</div>

</div>

<div class="tag">Links</div>

<div class="info">
muốn mua code thì vào link bên dưới 👇
</div>

<!-- BUTTONS -->
<div class="buttons">

<a class="btn" href="https://web.facebook.com/tr.dao91" target="_blank">📘 Facebook</a>

<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi" target="_blank">🎵 TikTok</a>

<a class="btn" href="https://discord.gg/cpY8dFhN" target="_blank">💬 Discord Server</a>

<button class="btn" onclick="copyDiscord()">📋 Copy Discord</button>

<button class="btn" onclick="shop()">🛒 Shop Code</button>

</div>

</div>

<script>

/* COPY DISCORD */
function copyDiscord(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied Discord!");
}

/* SHOP */
function shop(){
alert("Shop đang phát triển!");
}

</script>

</body>
</html>
