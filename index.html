<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
height:100vh;
overflow:hidden;
background:#0b0b10;
color:white;
}

/* ================= LOADING ================= */
#loading{
position:fixed;
inset:0;
background:#0b0b10;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:28px;
height:28px;
border:3px solid rgba(255,255,255,0.15);
border-top:3px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.loadingText{
font-size:14px;
letter-spacing:1px;
opacity:0.7;
animation:fade 1.2s ease-in-out infinite alternate;
}

@keyframes fade{
from{opacity:0.3}
to{opacity:1}
}

.loader{
width:200px;
height:4px;
background:rgba(255,255,255,0.08);
border-radius:10px;
overflow:hidden;
margin-top:12px;
}

.loader span{
display:block;
height:100%;
width:0%;
background:white;
animation:load 2s ease forwards;
}

@keyframes load{
to{width:100%}
}

/* ================= BACKGROUND ================= */
video.bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.5);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* ================= MAIN ================= */
#main{
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:90%;
max-width:360px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
text-align:center;
}

/* AVATAR */
.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,0.7);
}

/* TEXT */
.name{
font-size:20px;
font-weight:700;
margin-top:10px;
}

.desc{
font-size:13px;
opacity:0.8;
margin-top:5px;
}

/* CLOCK */
.clock{
font-size:13px;
opacity:0.7;
margin-top:6px;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:10px;
margin:7px 0;
border-radius:10px;
border:none;
cursor:pointer;
background:rgba(0,0,0,0.4);
color:white;
text-decoration:none;
text-align:center;
transition:0.2s;
}

.btn:hover{
background:rgba(255,255,255,0.15);
}

/* MUSIC */
.musicBox{
margin-top:10px;
}

.musicBox input{
width:100%;
margin-top:6px;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">

<div class="spinner"></div>

<div class="loadingText">Loading system...</div>

<div class="loader"><span></span></div>

</div>

<!-- BACKGROUND -->
<video class="bg" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- MAIN -->
<div id="main">

<div class="card">

<img class="avatar" src="./avatar.jpg">

<div class="name">Chuuong Dao</div>

<div class="desc">Developer • Gamer • Bio</div>

<div class="clock" id="clock">00:00:00</div>

<a class="btn" href="https://web.facebook.com/tr.dao91">Facebook</a>
<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi">TikTok</a>
<a class="btn" href="https://discord.gg/cpY8dFhN">Discord</a>

<button class="btn" onclick="copyDiscord()">Copy Discord</button>
<button class="btn" onclick="toggleMusic()">Play / Pause</button>

<div class="musicBox">

<audio id="music" loop>
<source src="./music.mp3" type="audio/mpeg">
</audio>

<input type="range" min="0" max="1" step="0.01" value="0.5"
onchange="setVolume(this.value)">

</div>

</div>

</div>

<script>

/* LOADING */
setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("main").style.display="flex";
},2000);

/* CLOCK */
function updateClock(){
const now=new Date();

let h=now.getHours();
let m=now.getMinutes();
let s=now.getSeconds();

h=h<10?"0"+h:h;
m=m<10?"0"+m:m;
s=s<10?"0"+s:s;

document.getElementById("clock").innerText =
h+":"+m+":"+s;
}

setInterval(updateClock,1000);
updateClock();

/* COPY */
function copyDiscord(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied!");
}

/* MUSIC */
const music=document.getElementById("music");

function toggleMusic(){
if(music.paused) music.play();
else music.pause();
}

function setVolume(v){
music.volume=v;
}

</script>

</body>
</html>
