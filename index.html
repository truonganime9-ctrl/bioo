<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio VIP</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
height:100vh;
overflow:hidden;
background:#0b0b10;
color:white;
}

/* ================= LOADING ================= */
#loading{
position:fixed;
inset:0;
z-index:9999;
overflow:hidden;
}

/* VIDEO nền loading */
.loadbg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:blur(10px) brightness(0.5);
transform:scale(1.1);
}

/* overlay loading */
.loadOverlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

/* loading content */
.loadBox{
position:relative;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* BIO text */
.logoPulse{
font-size:42px;
font-weight:800;
letter-spacing:3px;
animation:pulse 1.6s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:0.6}
50%{transform:scale(1.1);opacity:1}
100%{transform:scale(1);opacity:0.6}
}

/* text */
.loadingText{
font-size:14px;
opacity:0.8;
margin-top:6px;
}

/* dots */
.dots{
display:flex;
gap:6px;
margin:12px 0;
}

.dots span{
width:7px;
height:7px;
border-radius:50%;
background:white;
animation:bounce 0.6s infinite alternate;
}

.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}

@keyframes bounce{
from{transform:translateY(0);opacity:0.4}
to{transform:translateY(-6px);opacity:1}
}

/* bar */
.bar{
width:220px;
height:4px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.bar span{
display:block;
height:100%;
width:0%;
background:linear-gradient(90deg,#fff,#aaa,#fff);
animation:load 2s ease forwards;
}

@keyframes load{
to{width:100%}
}

/* fade out loading */
.fadeOut{
animation:fadeOut 0.6s ease forwards;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
transform:scale(1.02);
}
}

/* ================= BACKGROUND MAIN ================= */
video.bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.5);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-2;
}

/* ================= MAIN ================= */
#main{
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:90%;
max-width:360px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
text-align:center;
}

/* AVATAR */
.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,0.7);
}

/* TEXT */
.name{
font-size:20px;
font-weight:700;
margin-top:10px;
}

.desc{
font-size:13px;
opacity:0.8;
margin-top:5px;
}

/* CLOCK */
.clock{
font-size:13px;
opacity:0.7;
margin-top:6px;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:10px;
margin:7px 0;
border-radius:10px;
border:none;
cursor:pointer;
background:rgba(0,0,0,0.4);
color:white;
text-decoration:none;
text-align:center;
transition:0.2s;
}

.btn:hover{
background:rgba(255,255,255,0.15);
}

.btn:active{
transform:scale(0.96);
}

/* STAR */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.5;
animation:starMove 6s linear infinite;
z-index:-1;
}

@keyframes starMove{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">

<video class="loadbg" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="loadOverlay"></div>

<div class="loadBox">

<div class="logoPulse">BIO</div>

<div class="loadingText">Loading profile</div>

<div class="dots">
<span></span><span></span><span></span>
</div>

<div class="bar"><span></span></div>

</div>

</div>

<!-- BACKGROUND -->
<video class="bg" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- MAIN -->
<div id="main">

<div class="card">

<img class="avatar" src="./avatar.jpg">

<div class="name">Chuuong Dao</div>

<div class="desc">Developer • Gamer • Bio</div>

<div class="clock" id="clock">00:00:00</div>

<a class="btn" href="https://web.facebook.com/tr.dao91">Facebook</a>
<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi">TikTok</a>
<a class="btn" href="https://discord.gg/cpY8dFhN">Discord</a>

<button class="btn" onclick="copyDiscord()">Copy Discord</button>

</div>

</div>

<script>

/* LOADING */
setTimeout(()=>{
let load=document.getElementById("loading");
load.classList.add("fadeOut");

setTimeout(()=>{
load.style.display="none";
document.getElementById("main").style.display="flex";
},600);

},2000);

/* CLOCK */
setInterval(()=>{
const d=new Date();
let h=d.getHours();
let m=d.getMinutes();
let s=d.getSeconds();

h=h<10?"0"+h:h;
m=m<10?"0"+m:m;
s=s<10?"0"+s:s;

document.getElementById("clock").innerText=
h+":"+m+":"+s;
},1000);

/* COPY */
function copyDiscord(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied!");
}

/* STAR */
function createStars(){
setInterval(()=>{
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},120);
}
createStars();

</script>

</body>
</html>
