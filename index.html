<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuuong Dao Bio</title>

<style>

/* =========================
   RESET + BASE STYLE
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:#000;
}

/* =========================
   BACKGROUND VIDEO LAYER
========================= */
video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.55) contrast(1.1);
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-2;
}

/* =========================
   FLOATING PARTICLES
========================= */
.particle{
position:fixed;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.4;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:0.6}
100%{transform:translateY(-10vh);opacity:0}
}

/* =========================
   MAIN CARD
========================= */
.card{
width:90%;
max-width:380px;
padding:20px;
border-radius:18px;

background:rgba(255,255,255,0.07);
backdrop-filter:blur(16px);

box-shadow:0 10px 35px rgba(0,0,0,0.6);

text-align:center;

animation:cardIn 0.6s ease;
}

@keyframes cardIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* =========================
   AVATAR
========================= */
.avatar{
width:105px;
height:105px;
border-radius:50%;
border:3px solid rgba(255,255,255,0.8);
object-fit:cover;

box-shadow:0 0 20px rgba(255,255,255,0.2);

transition:0.3s;
}

.avatar:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(255,255,255,0.35);
}

/* =========================
   TEXT INFO
========================= */
.name{
font-size:22px;
font-weight:800;
margin-top:10px;
}

.desc{
font-size:13px;
opacity:0.75;
margin-top:4px;
}

.info{
font-size:13px;
opacity:0.8;
margin:10px 0;
line-height:1.4;
}

/* =========================
   BUTTON SYSTEM
========================= */
.btn{
display:block;
width:100%;
padding:11px;
margin:8px 0;

border-radius:12px;
border:1px solid rgba(255,255,255,0.08);

background:rgba(0,0,0,0.35);
color:white;

text-decoration:none;
text-align:center;
cursor:pointer;

transition:0.25s;
}

.btn:hover{
transform:scale(1.04);
background:rgba(255,255,255,0.18);
border-color:rgba(255,255,255,0.2);
}

/* =========================
   MUSIC CONTROL PANEL
========================= */
.musicBox{
margin-top:10px;
padding:10px;

background:rgba(255,255,255,0.05);
border-radius:12px;
}

.musicBox input{
width:100%;
margin-top:8px;
}

/* =========================
   SMALL GLOW EFFECT
========================= */
.card::before{
content:"";
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);
top:-80px;
left:-80px;
filter:blur(25px);
}

/* =========================
   FOOT ANIMATION BORDER
========================= */
.card::after{
content:"";
position:absolute;
inset:0;
border-radius:18px;
padding:1px;
background:linear-gradient(45deg,transparent,rgba(255,255,255,0.2),transparent);
mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
mask-composite:exclude;
pointer-events:none;
}

</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bg" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- CARD -->
<div class="card">

<img class="avatar" src="./avatar.jpg">

<div class="name">Chuuong Dao</div>
<div class="desc">Developer • Gamer • Bio</div>

<div class="info">
muốn mua code thì vào link bên dưới 👇
</div>

<!-- LINKS -->
<a class="btn" href="https://web.facebook.com/tr.dao91" target="_blank">📘 Facebook</a>
<a class="btn" href="https://www.tiktok.com/@chia_tay_la_gi" target="_blank">🎵 TikTok</a>
<a class="btn" href="https://discord.gg/cpY8dFhN" target="_blank">💬 Discord</a>

<!-- ACTION -->
<button class="btn" onclick="copyDiscord()">📋 Copy Discord</button>
<button class="btn" onclick="toggleMusic()">🎵 Play / Pause Music</button>

<!-- MUSIC UI -->
<div class="musicBox">
  <audio id="music" loop>
    <source src="./music.mp3" type="audio/mpeg">
  </audio>

  <input type="range" min="0" max="1" step="0.01" value="0.5"
  onchange="setVolume(this.value)">
</div>

</div>

<script>

/* =========================
   COPY DISCORD
========================= */
function copyDiscord(){
navigator.clipboard.writeText("truongdzz1319");
alert("Copied Discord!");
}

/* =========================
   MUSIC CONTROL
========================= */
const music = document.getElementById("music");

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

function setVolume(v){
music.volume = v;
}

/* =========================
   PARTICLES SYSTEM
========================= */
function spawnParticle(){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
document.body.appendChild(p);

setTimeout(()=>p.remove(),8000);
}
setInterval(spawnParticle,300);

</script>

</body>
</html>
